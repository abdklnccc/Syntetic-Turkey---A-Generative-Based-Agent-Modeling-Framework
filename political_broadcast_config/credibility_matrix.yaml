    conservative_economically_disillusioned: {credibility: 0.62, likely_effect: persuade,             explanation: "2024 peripheral-Istanbul AKP defections."}
    alevi_chp_loyalist:                  {credibility: 0.82, likely_effect: mobilize_base,            explanation: "High but slightly below Kilicdaroglu identity affinity."}
    kurdish_political_voter:             {credibility: 0.58, likely_effect: persuade,                 explanation: "HDP tactical non-candidacy 2019; multicultural framing."}
