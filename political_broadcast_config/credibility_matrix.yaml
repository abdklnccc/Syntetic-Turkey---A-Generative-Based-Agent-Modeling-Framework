calibration_notes:
  - "Credibility values are simulation calibration parameters, not measured public-opinion percentages."
  - "Apply broadcast_power_multipliers from political_agents.yaml in addition to these credibility values."
  - "kurdish_movement_agent credibility cells are period-modulated: multiply by the active phase modifier."
  - "Demirtas only operates when invoked by the movement; treat his row as conditional, not continuous broadcast."
  - "Internal persona deltas cap at [0,1] after addition to the movement row."
