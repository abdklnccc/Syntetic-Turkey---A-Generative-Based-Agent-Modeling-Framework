# Synthetic Turkey — Credibility Matrix
# (agent_id, voter_archetype) -> credibility, likely_effect, explanation
# Companion to political_agents.yaml.
# All credibility values are source-grounded simulation calibration parameters in [0,1].

schema_version: "1.0"

voter_archetypes:
  - id: devout_anatolian_loyalist
    label: "Devout Anatolian Loyalist"
  - id: secular_urban_professional
    label: "Secular Urban Professional"
  - id: conservative_economically_disillusioned
    label: "Conservative Economically Disillusioned"
  - id: alevi_chp_loyalist
    label: "Alevi-CHP Loyalist"
  - id: kurdish_political_voter
    label: "Kurdish Political Voter"
  - id: nationalist_grey_wolf_core
    label: "Nationalist Grey Wolf Core"
  - id: moderate_nationalist_opposition
    label: "Moderate Nationalist Opposition"
  - id: pious_disillusioned_islamist
    label: "Pious Disillusioned Islamist"
  - id: young_urban_protest_voter
    label: "Young Urban Protest Voter"
  - id: earthquake_zone_loyalist
    label: "Earthquake Zone Loyalist"
  - id: retired_protest_voter
    label: "Retired Protest Voter"
  - id: cosmopolitan_liberal_urban_professional
    label: "Cosmopolitan Liberal Urban Professional"

effect_codes:
  persuade: "Moves persuadable voters to support"
  mobilize_base: "Activates existing supporters / raises turnout"
  reinforce_existing_belief: "Consolidates prior orientation"
  trigger_backlash: "Activates counter-mobilization"
  ignored: "Below salience threshold"

credibility:

  erdogan_recep_tayyip:
    devout_anatolian_loyalist:           {credibility: 0.85, likely_effect: mobilize_base,            explanation: "Foundational base; religion + civilisational restoration frame."}
    secular_urban_professional:          {credibility: 0.10, likely_effect: trigger_backlash,         explanation: "Net disapproval -20 to -30 (MetroPOLL 2021-22)."}
    conservative_economically_disillusioned: {credibility: 0.48, likely_effect: reinforce_existing_belief, explanation: "Welfare clientelism vs inflation; fragile loyalty."}
    alevi_chp_loyalist:                  {credibility: 0.05, likely_effect: trigger_backlash,         explanation: "Sectarian framing of Kilicdaroglu read as direct threat."}
    kurdish_political_voter:             {credibility: 0.15, likely_effect: trigger_backlash,         explanation: "Peace-process collapse + kayyum; minority conservative Kurds reachable."}
    nationalist_grey_wolf_core:          {credibility: 0.70, likely_effect: reinforce_existing_belief, explanation: "People's Alliance structural; YRP/Zafer slight leakage."}
    moderate_nationalist_opposition:     {credibility: 0.30, likely_effect: trigger_backlash,         explanation: "IYI-aligned voters view him as authoritarian."}
    pious_disillusioned_islamist:        {credibility: 0.45, likely_effect: reinforce_existing_belief, explanation: "Some leakage to YRP/Saadet but cultural pull holds."}
    young_urban_protest_voter:           {credibility: 0.20, likely_effect: trigger_backlash,         explanation: "OyMoyYok generation; 25% youth unemployment."}
    earthquake_zone_loyalist:            {credibility: 0.55, likely_effect: reinforce_existing_belief, explanation: "AKP won 8 of 11 quake provinces in May 2023 despite criticism."}
    retired_protest_voter:               {credibility: 0.40, likely_effect: reinforce_existing_belief, explanation: "Pension erosion vs religious-identity loyalty; bifurcated."}
