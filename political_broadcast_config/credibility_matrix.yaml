    notes: "Elder-statesman dialogue posture; younger base reads as accommodationist"

  zeydan_abdullah:
    kurdish_political_voter: +0.07
    cosmopolitan_liberal_urban_professional: +0.05
    notes: "Post-Van mandate defence"

  kisanak_gultan:
    cosmopolitan_liberal_urban_professional: +0.05
    young_urban_protest_voter: +0.07
    period_scope: [P6]
