# Period multipliers for kurdish_movement_agent credibility cells.
# Apply these to the movement row above as multiplicative modifiers.
kurdish_movement_period_multipliers:
  HDP_phase:
    period_ids: [P1, P2, P3, P4]
    end_date: "2023-08-27"
    multipliers:
      all_cells: 1.00   # baseline
  YSP_phase:
    period_ids: [P4_electoral]
    date_range: ["2023-03-24", "2023-10-15"]
    multipliers:
      kurdish_political_voter_recognition: 0.85
      cross_camp_reach: 1.05
  HEDEP_phase:
    period_ids: [P5]
    date_range: ["2023-10-15", "2023-12-11"]
    multipliers:
      all_recognition: 0.80
  DEM_phase:
    period_ids: [P6, P7]
    effective_from: "2023-12-11"
    multipliers:
      all_recognition: 0.95
      mobilization_effect_modifier: 1.10   # Third Way mobilisation boost

# Internal personas inherit the kurdish_movement_agent credibility row and
# apply selective deltas when invoked. Engines should cap final values at [0,1].
internal_persona_credibility_deltas:

  buldan_pervin:
    cosmopolitan_liberal_urban_professional: +0.05
    notes: "+0.05 women_voters where the model exposes that segment"

  sancar_mithat:
