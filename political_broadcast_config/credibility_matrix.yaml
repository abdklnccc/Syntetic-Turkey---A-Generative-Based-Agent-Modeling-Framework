    conservative_economically_disillusioned: {credibility: 0.28, likely_effect: ignored,              explanation: "Minimal economic content."}
    alevi_chp_loyalist:                  {credibility: 0.05, likely_effect: trigger_backlash,         explanation: "Hard nationalist register read as direct threat."}
    kurdish_political_voter:             {credibility: 0.05, likely_effect: trigger_backlash,         explanation: "Closure demands + trustee endorsement."}
    nationalist_grey_wolf_core:          {credibility: 0.85, likely_effect: mobilize_base,            explanation: "Ulkucu organizational network identity."}
    moderate_nationalist_opposition:     {credibility: 0.20, likely_effect: trigger_backlash,         explanation: "IYI defined itself against him."}
    pious_disillusioned_islamist:        {credibility: 0.30, likely_effect: reinforce_existing_belief, explanation: "Religion-nation overlap but state-centric distance."}
