    alevi_chp_loyalist:                  {credibility: 0.40, likely_effect: reinforce_existing_belief, explanation: "Coalition-via-CHP affinity; identity distance."}
    kurdish_political_voter:             {credibility: 0.10, likely_effect: trigger_backlash,         explanation: "1990s Interior Ministry record; refugee rhetoric."}
