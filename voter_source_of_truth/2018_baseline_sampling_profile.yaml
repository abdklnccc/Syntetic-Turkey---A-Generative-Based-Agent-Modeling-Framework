meta:
  name: "Synthetic Turkey 2018 Baseline Sampling Profile"
  purpose: >
    A thesis-facing electorate profile for generating a more representative
    post-June-2018 baseline. This profile anchors the synthetic voter pool to
    the 24 June 2018 parliamentary and presidential election results while
    preserving LLM-first voter reasoning.
  recommended_sample_size: 300
  recommended_use: >
    Use N=300 for thesis calibration and final reported runs. Keep N=50 only
    for quick MVP/debug runs. N=300 gives roughly 0.33 percentage-point
    resolution per agent and keeps small blocs such as Saadet/Felicity visible.
  important_note: >
    Counts are a sampling frame, not deterministic vote rules. Agents should
    receive 2018 party/candidate anchors as memory/persona grounding; the LLM
    must still reason through subsequent 2018-2023 events.

sources:
  ysk_domestic_presidential_pdf: "https://www.ysk.gov.tr/doc/dosyalar/Ingilizce/ElectionResults/2018CB-416A_en.pdf"
  osce_odihr_final_report: "https://www.osce.org/files/f/documents/9/4/397046_0.pdf"
  ysk_decision_reference: "SBE/YSK decision no. 953, 4 July 2018, as reproduced in OSCE/ODIHR Annex I"

sample_size_tiers:
  prototype:
    agents: 50
    use: "Fast prompt/debug runs only."
    limitation: "One agent equals 2 percentage points; small parties and Ogan-like nationalist protest pathways disappear easily."
  calibration:
    agents: 200
    use: "Lower-cost OpenAI calibration runs."
    limitation: "Still weak for sub-1% and highly cross-pressured groups."
  thesis_recommended:
    agents: 300
    use: "Recommended final thesis simulation size."
    limitation: "Costs about 11,100 voter-decision calls for 37 ticks."
  high_resolution:
    agents: 500
    use: "Best if budget allows or if using batched/cheaper models."
    limitation: "Costs about 18,500 voter-decision calls for 37 ticks."

