modeling_guidance:
  - "Use party_2018 and presidential_vote_2018 as fixed baseline memory, not as future vote rules."
  - "Add cross-pressured voters inside each party bloc; do not make every AKP voter an Erdogan maximalist or every CHP voter a secular professional."
  - "Preserve 2018 HDP party > Demirtas presidential gap; this matters for later Kurdish opposition alignment."
  - "Preserve 2018 MHP and IYI separately; their divergence is necessary for a realistic 2023 Sinan Ogan pathway."
  - "Other_small_parties mostly means Saadet/Felicity, HUDA PAR, Vatan/Patriotic, independents, and tiny parties; current archetypes do not perfectly represent all of them."
  - "If Perincek/Vatan voters need explicit representation, use N=500 or weighted agents; N=300 rounds them to zero."
