# Synthetic Turkey — Event-Specific Behavior Matrix
# 17 events x active agents. All message_frame values are PARAPHRASED — no direct quotes.
# Companion to political_agents.yaml, credibility_matrix.yaml, movement_state_machine.yaml.

schema_version: "1.0"

confidence_levels:
  high: "Directly supported by source profile evidence"
  medium: "Supported by source profile interpretation"
  low: "Primarily INTERP / SIM-ASSUME"

effect_codes:
  persuade: "Moves persuadable voters to support"
  mobilize_base: "Activates existing supporters / raises turnout"
  reinforce_existing_belief: "Consolidates prior orientation"
  trigger_backlash: "Activates counter-mobilization"
  ignored: "Below salience threshold"

